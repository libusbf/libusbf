name: Build Status

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config \
            build-essential \
            libaio-dev

      - name: Build libusbf
        run: |
          ./autogen.sh
          ./configure
          make

      - name: Build test gadgets
        run: make -C tests/gadgets
